<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>WN-01 Mini Noise Unit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050608;
      --panel: #111827;
      --accent: #38bdf8;
      --accent-soft: #0ea5e9;
      --text: #e5e7eb;
    }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .shell {
      width: 100%;
      max-width: 420px;
      padding: 16px 16px 20px;
      border-radius: 18px;
      background: linear-gradient(145deg, #020617, #0b1120);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(15, 23, 42, 0.8);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 16px;
    }
    .title {
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 11px;
      opacity: 0.7;
    }

    .panel {
      background: radial-gradient(circle at top left, #1f2937, #020617);
      border-radius: 14px;
      padding: 14px 14px 16px;
      box-shadow:
        inset 0 0 0 1px rgba(148, 163, 184, 0.12),
        0 12px 30px rgba(15, 23, 42, 0.8);
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-main {
      width: 100%;
      padding: 12px 16px;
      border-radius: 999px;
      border: none;
      font-size: 15px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
      background: radial-gradient(circle at top left, var(--accent-soft), #0f172a);
      color: #0b1120;
      box-shadow:
        0 0 0 1px rgba(8, 47, 73, 0.7),
        0 12px 26px rgba(56, 189, 248, 0.35);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }
    .btn-main.active {
      background: radial-gradient(circle at top left, #f97316, #ea580c);
      color: #020617;
      box-shadow:
        0 0 0 1px rgba(248, 250, 252, 0.9),
        0 18px 40px rgba(248, 113, 113, 0.65);
    }
    .btn-main:active {
      transform: translateY(1px);
      box-shadow:
        0 0 0 1px rgba(8, 47, 73, 0.9),
        0 8px 18px rgba(15, 23, 42, 0.7);
    }

    .btn-indicator {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #facc15, #b91c1c);
      box-shadow:
        0 0 6px rgba(248, 250, 252, 0.9),
        0 0 20px rgba(248, 113, 113, 0.8);
    }

    .slider-block {
      margin-top: 10px;
      padding: 10px 10px 6px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(8, 47, 73, 0.9));
      box-shadow:
        inset 0 0 0 1px rgba(148, 163, 184, 0.25),
        0 10px 22px rgba(15, 23, 42, 0.9);
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 4px;
    }
    .slider-value {
      font-variant-numeric: tabular-nums;
      opacity: 0.85;
    }

    .slider {
      -webkit-appearance: none;
      width: 100%;
      height: 18px;
      background: transparent;
    }
    .slider:focus { outline: none; }

    .slider::-webkit-slider-runnable-track {
      height: 4px;
      background: linear-gradient(90deg, #0f172a, #22d3ee);
      border-radius: 999px;
      box-shadow:
        inset 0 0 0 1px rgba(15, 23, 42, 0.9),
        0 0 10px rgba(34, 211, 238, 0.7);
    }
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      margin-top: -7px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #f9fafb, #e5e7eb);
      box-shadow:
        0 0 0 2px rgba(15, 23, 42, 0.95),
        0 6px 14px rgba(15, 23, 42, 0.8);
    }

    .footer {
      margin-top: 10px;
      font-size: 10px;
      opacity: 0.65;
      text-align: center;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div>
        <div class="title">WN-01</div>
        <div class="subtitle">Mini Noise Unit / iPhone</div>
      </div>
      <div class="subtitle">2026 / HYAKU LAB</div>
    </div>

    <div class="panel">
      <div class="row">
        <button id="powerBtn" class="btn-main" type="button">
          <span class="btn-indicator" aria-hidden="true"></span>
          <span>Power / Start Noise</span>
        </button>

        <div class="slider-block">
          <div class="slider-label">
            <span>Noise Density</span>
            <span id="densityVal" class="slider-value">0.50</span>
          </div>
          <input
            id="densitySlider"
            class="slider"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
          />
        </div>
      </div>
    </div>

    <div class="footer">
      Tap to start audio · Slide to sculpt noise
    </div>
  </div>

  <script>
    let audioCtx = null;
    let noiseNode = null;
    let filterNode = null;

    const powerBtn = document.getElementById("powerBtn");
    const densitySlider = document.getElementById("densitySlider");
    const densityVal = document.getElementById("densityVal");

    function ensureAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function createNoiseBuffer(density) {
      const sampleRate = audioCtx.sampleRate;
      const length = sampleRate * 2;
      const buffer = audioCtx.createBuffer(1, length, sampleRate);
      const data = buffer.getChannelData(0);

      const threshold = density;
      for (let i = 0; i < length; i++) {
        const r = Math.random();
        if (r < threshold) {
          const v = (Math.random() * 2 - 1) * 0.8;
          data[i] = v;
        } else {
          data[i] = 0;
        }
      }
      return buffer;
    }

    function updateNoiseDensity() {
      if (!audioCtx || !noiseNode) return;
      const density = parseFloat(densitySlider.value);
      densityVal.textContent = density.toFixed(2);
      const buffer = createNoiseBuffer(density);
      noiseNode.buffer = buffer;
    }

    function startNoise() {
      ensureAudioContext();

      const density = parseFloat(densitySlider.value);

      const bufferSource = audioCtx.createBufferSource();
      bufferSource.buffer = createNoiseBuffer(density);
      bufferSource.loop = true;

      const filter = audioCtx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.value = 600;
      filter.Q.value = 0.6;

      const gain = audioCtx.createGain();
      gain.gain.value = 0.22;

      bufferSource.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      bufferSource.start();

      noiseNode = bufferSource;
      filterNode = filter;
      powerBtn.classList.add("active");
    }

    function stopNoise() {
      if (noiseNode) {
        try { noiseNode.stop(); } catch (e) {}
        noiseNode.disconnect();
        noiseNode = null;
      }
      if (filterNode) {
        filterNode.disconnect();
        filterNode = null;
      }
      powerBtn.classList.remove("active");
    }

    function toggleNoise() {
      if (noiseNode) {
        stopNoise();
      } else {
        startNoise();
      }
    }

    powerBtn.addEventListener("pointerdown", (ev) => {
      ev.preventDefault();
      toggleNoise();
    });

    densitySlider.addEventListener("input", () => {
      updateNoiseDensity();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        stopNoise();
      }
    });
  </script>
</body>
</html>
